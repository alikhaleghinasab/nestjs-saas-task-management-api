name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672

    env:
      NODE_ENV: test

      DATABASE_HOST: localhost
      DATABASE_DB_NAME: test_db

      REDIS_HOST: localhost
      REDIS_PORT: 6379

      RABBITMQ_HOST: localhost

      RUN_MIGRATIONS_ON_BOOT: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env
        run: cp .env.example .env

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Create test databases
        run: |
          PGPASSWORD=postgres psql \
          -h localhost \
          -U postgres \
          -d postgres \
          -c "CREATE DATABASE jira_test_integration;"

          PGPASSWORD=postgres psql \
          -h localhost \
          -U postgres \
          -d postgres \
          -c "CREATE DATABASE jira_test_e2e;"

      - name: Unit tests
        run: pnpm test:unit

      - name: Integration tests
        run: pnpm test:integration

      - name: E2E tests
        run: pnpm test:e2e

  docker:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t saas-task-api .
